    /* ═══════════════════════════════════════════════════════════════

      left: 46% !important;
      transform: translate(-50%, -50%) !important;
      white-space: nowrap !important;
    }

    /* ── "What We Do" service card body text boost ───────────────── */
    p.text-xs.font-light.text-cream-300.leading-relaxed.opacity-65 {
      font-size: 0.875rem !important;
      line-height: 1.8 !important;
      opacity: 0.75 !important;

    @media (min-width: 768px) {
      p.text-xs.font-light.text-cream-300.leading-relaxed.opacity-65 {
        font-size: 0.9375rem !important;
      }

    /* ── "Our Approach / How We Deliver" body text boost ────────── */
    p.text-xs.font-light.text-cream-300.leading-relaxed.opacity-60 {
      font-size: 0.875rem !important;
      line-height: 1.8 !important;
      opacity: 0.7 !important;

    @media (min-width: 768px) {
      p.text-xs.font-light.text-cream-300.leading-relaxed.opacity-60 {
        font-size: 0.9375rem !important;

      opacity: 0.5 !important;
